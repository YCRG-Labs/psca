      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

2c9e5afaccd13a84254e6d", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "wAgl", "name": "_"}, {"code": "", "code_hash": "ca28282f90d8daf2fa8b77ce2e56f475", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "rEll", "name": "_"}, {"code": "", "code_hash": "2c74d5521ecf05748119e4ee8ed2b532", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "dGlV", "name": "_"}, {"code": "", "code_hash": "18ffdc777d4d49889f4b95d7b4a4a203", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "SdmI", "name": "_"}, {"code": "", "code_hash": "d2e6c83eed42785fceb29ffaa2f5710e", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "lgWD", "name": "_"}, {"code": "", "code_hash": "60fe074af005b5bda8870c5cb3e5cc3c", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "yOPj", "name": "_"}, {"code": "", "code_hash": "c57add1ba09fe56ea243fb04a8011f37", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "fwwy", "name": "_"}, {"code": "", "code_hash": "2479421f2aedfd9464f3315b18a535e2", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "LJZf", "name": "_"}], "metadata": {"marimo_version": "0.23.6"}, "version": "1"},
            "session": {"cells": [{"code_hash": "246ebf7925b26d1009dcbe472f13b6f2", "console": [], "id": "Hbol", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"prompt-specification-curve-analysis\"\u003EPrompt Specification Curve Analysis\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cem\u003EA reproducible tour of how arbitrary prompt choices drive LLM-simulated public opinion.\u003C/em\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EWhen a researcher asks a language model to simulate a survey respondent, the resulting \"public opinion\" depends not only on the population that has been described but on a dozen small decisions about how to ask. This notebook is an applied tour of P-SCA, a framework for treating those decisions as the object of study rather than as nuisance parameters. By the time you reach the end you will have constructed prompts interactively, sampled a multiverse of plausible designs, watched a specification curve come together in real time, and seen the single configuration in which a 70-billion-parameter model reports that Republicans want stricter gun laws than Democrats.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EEverything that follows runs on a corpus of 160,035 valid model responses collected in May 2026, shipped alongside this notebook, so no API keys are required.\u003C/span\u003E\n\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003ECompanion paper: Crainic, J., Yee, B., and Koh, P. (2026), \u003Cem\u003EPrompt Specification Curve Analysis: How Arbitrary Choices Drive LLM-Simulated Opinion\u003C/em\u003E. Toolkit at \u003Ca href=\"https://github.com/YCRG-Labs/psca\" rel=\"noopener noreferrer\" target=\"_blank\"\u003E\u003Ccode\u003EYCRG-Labs/psca\u003C/code\u003E\u003C/a\u003E.\u003C/span\u003E\n\u003C/blockquote\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "3bd3203a5e6f4936a0fcfe16da828c3a", "console": [], "id": "MJUe", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "2b9c8b3c5cf3c9a7d5d7a7f8048d44dc", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-30-second-finding\"\u003EThe 30-second finding\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1938067ea1bc8c5f6b0a68ae5e3c0b48", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EBefore any methodology, here is the headline that the rest of the notebook unpacks. Holding the model, the item, and the population fixed, simply swapping the question framing from a direct multiple-choice presentation to a Likert anchor turns Llama 3.3 70B's gun-control gap from a healthy positive number into a negative one. The same model, in the same multiverse, with one knob moved, publishes a different finding.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "13697a96addcb8db7ecf027997f6e638", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style=\"border-left:3px solid #DA1E28; background:#F4F4F4; padding:10px 14px; font-family:Charter, Iowan Old Style, Palatino, Georgia, serif; color:#161616; margin-bottom:10px\"\u003E\u003Cb style=\"color:#DA1E28\"\u003EA single prompt knob flips the partisan sign.\u003C/b\u003E Llama 3.3 70B, gun control, 20 ANES profiles, 5 repeats per cell.\u003C/div\u003E\u003Cmarimo-ui-element object-id='lEQa-0' random-id='1cf69b88-00ce-575b-20a7-7650a2ae574e'\u003E\u003Cmarimo-table data-initial-value='[]' data-label='null' data-data='\u0026quot;[{\u0026#92;\u0026quot;framing\u0026#92;\u0026quot;:\u0026#92;\u0026quot;direct\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Democrat mean\u0026#92;\u0026quot;:4.62,\u0026#92;\u0026quot;Republican mean\u0026#92;\u0026quot;:2.34,\u0026#92;\u0026quot;gap (D \u0026#92;\u0026#92;u2212 R)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;+2.28\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;framing\u0026#92;\u0026quot;:\u0026#92;\u0026quot;forced-choice\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Democrat mean\u0026#92;\u0026quot;:4.51,\u0026#92;\u0026quot;Republican mean\u0026#92;\u0026quot;:2.5,\u0026#92;\u0026quot;gap (D \u0026#92;\u0026#92;u2212 R)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;+2.01\u0026#92;\u0026quot;},{\u0026#92;\u0026quot;framing\u0026#92;\u0026quot;:\u0026#92;\u0026quot;likert\u0026#92;\u0026quot;,\u0026#92;\u0026quot;Democrat mean\u0026#92;\u0026quot;:1.99,\u0026#92;\u0026quot;Republican mean\u0026#92;\u0026quot;:3.91,\u0026#92;\u0026quot;gap (D \u0026#92;\u0026#92;u2212 R)\u0026#92;\u0026quot;:\u0026#92;\u0026quot;\u0026#92;\u0026#92;u22121.92\u0026#92;\u0026quot;}]\u0026quot;' data-total-rows='3' data-total-columns='4' data-max-columns='50' data-banner-text='\u0026quot;\u0026quot;' data-pagination='false' data-page-size='5' data-field-types='[[\u0026quot;framing\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;Democrat mean\u0026quot;,[\u0026quot;number\u0026quot;,\u0026quot;float64\u0026quot;]],[\u0026quot;Republican mean\u0026quot;,[\u0026quot;number\u0026quot;,\u0026quot;float64\u0026quot;]],[\u0026quot;gap (D \u2212 R)\u0026quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]]]' data-show-filters='true' data-show-download='true' data-show-column-summaries='false' data-show-data-types='true' data-show-page-size-selector='false' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-has-stable-row-id='false' data-lazy='false' data-preload='false'\u003E\u003C/marimo-table\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "ade0f09a6dadd193371133b8a00a7077", "console": [], "id": "PKri", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"1-the-fragility-problem\"\u003E1. The fragility problem\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "daefc66df89b46b81edb526607744a1d", "console": [], "id": "Xref", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "6273973c04ade261d4753eb7786f816f", "console": [], "id": "SFPL", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESilicon sampling, the practice of using a language model to stand in for a survey respondent, has become an attractive shortcut across political science, marketing, and human-computer interaction. The appeal is straightforward: a few thousand carefully written prompts can, in principle, do the work of a hundred-thousand-dollar survey panel. What the literature has been slower to confront is that the prompt itself is underspecified. Whether the persona is rendered as a bare demographic vignette or as a short narrative biography, whether the question is asked in its original ANES wording or compressed into a Likert anchor, whether the system message tells the model it is helping with academic research or filling out a survey, whether the temperature is set close to zero or closer to one, whether examples accompany the question or not, every one of these choices is plausibly defensible, and together they describe a multiverse of equally reasonable designs that no single paper has the page count to fully report.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EP-SCA borrows specification curve analysis from econometrics, where Simonsohn, Simmons, and Nelson (2020) developed it to expose the sensitivity of empirical estimates to analytical choices, and rebuilds it for the prompt-design problem. The empirical question becomes whether the partisan signal that motivates a silicon-sampling result survives the rest of the multiverse, or whether the headline depends on a small region of design space that the authors happened to occupy.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "949453db55e781a767b3c05244cffbee", "console": [], "id": "BYtC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"2-six-prompt-dimensions\"\u003E2. Six prompt dimensions\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "da4be3e2b86c9dcd862bc8d53fa99af6", "console": [], "id": "RGSE", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EEvery specification in the P-SCA multiverse is a point in a six-dimensional grid whose axes correspond to the choices most often left implicit in published work. The widget below lets you assemble any point in that grid and see exactly what the API would receive, which makes the abstraction concrete in a way that prose cannot. Change a single dropdown and watch the prompt rewrite itself; the goal is to develop the intuition that \"the same question\" is, in operational terms, a family of different questions.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "954d1e5268abcdc0c960d336f5eca5bb", "console": [], "id": "Kclp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "4b16e2c70ca11859c75c5fb1a0977de2", "console": [], "id": "emfo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: center;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='emfo-0' random-id='babc44c5-86b4-a8f0-3e07-6b82ff94a608'\u003E\u003Cmarimo-dropdown da ES item\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;gov_spending\u0026quot;,\u0026quot;immigration\u0026quot;,\u0026quot;gun_control\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-full-width='false'\u003E\u003C/marimo-dropdown\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "327fdeca12426ae3e0e9bb1f3d2497d2", "console": [], "id": "Hstk", "outputs": [{"data": {"text/html": "\u003Cdiv style=\"max-width:760px; margin:8px auto; font-family:Charter, 'Iowan Old Style', Palatino, Georgia, serif; color:#161616\"\u003E\u003Cdiv style=\"font-size:12px; letter-spacing:0.05em; text-transform:uppercase; color:#6F6F6F; margin-bottom:4px\"\u003ESystem prompt\u003C/div\u003E\u003Cpre style=\"background:#F4F4F4; padding:10px 12px; border-radius:3px; white-space:pre-wrap; font-size:12.5px; margin:0 0 12px 0\"\u003EYou are participating in a research study. Please respond honestly based on the perspective described.\u003C/pre\u003E\u003Cdiv style=\"font-size:12px; letter-spacing:0.05em; text-transform:uppercase; color:#6F6F6F; margin-bottom:4px\"\u003EUser prompt\u003C/div\u003E\u003Cpre style=\"background:#F4F4F4; padding:10px 12px; border-radius:3px; white-space:pre-wrap; font-size:12.5px; margin:0 0 10px 0\"\u003EImagine you are a 55-year-old white male living in rural Westmoreland County, PA. He completed his education at the high school level and has consistently identified with the Republican party. He follows politics regularly and votes in most elections.\n\nDo you think the federal government should make it more difficult for people to buy a gun than it is now, make it easier for people to buy a gun, or keep these rules about the same as they are now?\n\nChoose a number from 1-5:\n  1. Make it much easier\n  2. Make it somewhat easier\n  3. Keep the same\n  4. Make it somewhat more difficult\n  5. Make it much more difficult\n\nRespond with only the number.\u003C/pre\u003E\u003Cdiv style=\"font-size:12.5px; color:#6F6F6F\"\u003EAPI call: \u003Ccode\u003Eclaude-sonnet-4-6\u003C/code\u003E at temperature \u003Ccode\u003E0.7\u003C/code\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "91dbb7003fe50f0dc28aafcd21669344", "console": [], "id": "nWHF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EStacking the cardinalities of those six dimensions gives 2,592 unique prompt configurations before any consideration of which voter is being simulated or which ANES item is being asked. Folding in twenty battleground-state profiles, three items, and five repeats per cell pushes the full factorial north of three quarters of a million API calls, which is wasteful even at nano-tier prices. The next section describes the design that makes a meaningful audit affordable.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7b95b6185abd3b7773fc119910e73c1e", "console": [], "id": "iLit", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"3-latin-hypercube-sampling\"\u003E3. Latin Hypercube sampling\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7b37939aefe87bc04fc3bdf0f1676a72", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ERather than enumerate the factorial, P-SCA draws from it using Latin Hypercube sampling, a quasi-random scheme that guarantees roughly balanced coverage along every marginal dimension while randomizing the joint structure. The practical effect is that six hundred LHS draws cover the design space more uniformly than six hundred independent random draws would, especially along the lower-cardinality axes. The slider lets you watch coverage materialize as the sample size grows, with the bars indicating how often each level of each dimension is hit.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4c7d59d847a86b202863acde8abf1c64", "console": [], "id": "ROlb", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e01b298c6195450cf4e0aa2a65375ab6", "console": [], "id": "qnkX", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: center;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='qnkX-0' random-id='7b84b3b5-c7d9-3027-d7ff-bb35df378d4e'\u003E\u003Cmarimo-slider data-initial-value='300' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;n specifications\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-start='50' data-stop='600' data-step='50' data-steps='[]' data-debounce='false' data-disabled='false' data-orientation='\u0026quot;horizontal\u0026quot;' data-show-value='false' data-include-input='false' data-full-width='false'\u003E\u003C/marimo-slider\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "bf1ca64b872e5cd10d477717a1161f33", "console": [], "id": "TqIu", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003E300 specifications drawn from LHS.\u003C/strong\u003E Marginal coverage by dimension:\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-mime-renderer data-mime='\u0026quot;application/vnd.vegalite.v6+json\u0026quot;' data-data='\u0026quot;{\u0026#92;n  \u0026#92;\u0026quot;\u0026#36;schema\u0026#92;\u0026quot;: \u0026#92;\u \u003E"}, "type": "data"}]}, {"code_hash": "6cc8e496401e62102c70b4a55f139562", "console": [], "id": "DnEU", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"4-the-multiverse-results\"\u003E4. The multiverse results\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4435520eababb544de1413a1a7186c1d", "console": [], "id": "ulZA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe shipped artifact contains \u003Cstrong\u003E160,035 valid responses\u003C/strong\u003E spread across \u003Cstrong\u003E540 specifications\u003C/strong\u003E, \u003Cstrong\u003E6 model systems\u003C/strong\u003E, \u003Cstrong\u003E3 ANES items\u003C/strong\u003E, and \u003Cstrong\u003E20 simulated profiles\u003C/strong\u003E.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EFor the headline numbers reported in the paper we drop Gemini 2.5 Flash, whose parse-failure rate on direct and Likert framings ran between ten and fourteen percent and would have contaminated downstream variance estimates (see paper \u00a74.1 for the diagnostic). The next cell applies that exclusion so that the analyses that follow line up with the published figures.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d6a7a552413f410b6d618a03321d0fdb", "console": [], "id": "ecfG", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EAfter excluding Gemini: \u003Cstrong\u003E148,031 responses\u003C/strong\u003E across \u003Cstrong\u003E499 specifications\u003C/strong\u003E.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4a725bf4e6f98c496fd262f2e8dd2db3", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"5-pick-your-own-headline\"\u003E5. Pick your own headline\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6aa915114b9cfc10a28d5b6c8a323fa9", "console": [], "id": "ZBYS", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ESuppose you were writing a single-shot silicon-sampling paper. You would settle on a model, a persona format, a question framing, a system prompt, a temperature, and a number of few-shot examples, and you would report whatever partisan gap fell out of that configuration. The widget below lets you play out that thought experiment against real data: choose any combination of the six dimensions, and the notebook will go looking for matching rows in the published P-SCA run and tell you what gap a paper built on that exact prompt would have reported.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5293f26e6a9e0ecf768610180b7a43ae", "console": [], "id": "aLJB", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: center;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='aLJB-0' random-id='ecfff258-9fdd-d27a-34a1-0500958d2d5d'\u003E\u003Cmarimo-dropdown data-initial-value='[\u0026quot;llama-3.3-70b\u0026quot;]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;model\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;gpt-5.4\u0026quot;,\u0026quot;claude-sonnet-4-6\u0026quot;,\u0026quot;gpt-5.4-nano\u0026quot;,\u0026quot;claude-haiku-4-5\u0026quot;,\u0026quot;llama-3.3-70b\u0026quot;,\u002 \u0026quot;\u0026gt;system prompt\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;neutral\u0026quot;,\u0026quot;academic\u0026quot;,\u0026quot;survey_admin\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-full-width='false'\u003E\u003C/marimo-dropdown\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: center;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cmarimo-ui-element object-id='aLJB-4' random-id='f53fd612-83be-2a2c-dbae-c3544524b545'\u003E\u003Cmarimo-dropdown data-initial-value='[\u0026quot;0.7\u0026quot;]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;temperature\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;0.0\u0026quot;,\u0026quot;0.3\u0026quot;,\u0026quot;0.7\u0026quot;,\u0026quot;1.0\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-full-width='false'\u003E\u003C/marimo-dropdown\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-ui-element object-id='aLJB-5' random-id='a0f78ba5-d7fe-6d0a-4416-9d68f3300ff3'\u003E\u003Cmarimo-dropdown data-initial-value='[\u0026quot;0\u0026quot;]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;few-shot\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;0\u0026quot;,\u0026quot;1\u0026quot;,\u0026quot;3\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-full-width='false'\u003E\u003C/marimo-dropdown\u003E\u003C/marimo-ui-element\u003E\u003Cmarimo-ui-element object-id='aLJB-6' random-id='dc4fff27-a0d6-afa9-a810-f2dfe322446f'\u003E\u003Cmarimo-dropdown data-initial-value='[\u0026quot;gun_control\u0026quot;]' data-label='\u0026quot;\u0026lt;span class=\u0026#92;\u0026quot;markdown prose dark:prose-invert contents\u0026#92;\u0026quot;\u0026gt;\u0026lt;span class=\u0026#92;\u0026quot;paragraph\u0026#92;\u0026quot;\u0026gt;item\u0026lt;/span\u0026gt;\u0026lt;/span\u0026gt;\u0026quot;' data-options='[\u0026quot;gov_spending\u0026quot;,\u0026quot;immigration\u0026quot;,\u0026quot;gun_control\u0026quot;]' data-allow-select-none='false' data-searchable='false' data-full-width='false'\u003E\u003C/marimo-dropdown\u003E\u003C/marimo-ui-element\u003E\u003C/div\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "e1846879d23906f59c58a9589bc04541", "console": [], "id": "nHfw", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: row;justify-content: center;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003ENo specification in the six-hundred-cell LHS run lands on this exact combination.\u003C/strong\u003E That absence is itself informative, because even six hundred LHS draws cover only a fraction of the 2,592 possible cells; nudging any one dimension will usually land on a sampled neighbor.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "6c84840a20abea5984294c39a64546e6", "console": [], "id": "xXTn", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cblockquote\u003E\n\u003Cspan class=\"paragraph\"\u003ESome combinations worth trying. Selecting Llama 3.3 70B with the Likert framing on gun control reproduces the inversion that the cold open opened with. Switching the same item to Claude Sonnet 4.6 with the direct framing recovers a calm gap of roughly two scale points in the expected direction. Choosing GPT-5.4-nano with forced-choice framing lands somewhere in between. The data has not changed, the question has not changed, and yet the six knobs alone span the distance between a sober finding and an embarrassing one.\u003C/span\u003E\n\u003C/blockquote\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "481b122b51c63a94d876297d563bb012", "console": [], "id": "AjVT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"6-live-specification-curve\"\u003E6. Live specification curve\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5ea0010efee16b9a43213af69a893249", "console": [], "id": "pHFh", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EThe specification curve generalizes the previous demo from a single chosen cell to every cell at once. For each spec we compute the difference between mean Democratic and mean Republican responses, sign-adjusted so that movement in the politically expected direction is positive, and then sort the specs from most negative to most positive. Bars colored blue lie on the expected side of zero; bars colored red represent specifications that would have reported the wrong-sign partisan gap. The filters below let you re-shape the multiverse on the fly. Dropping a model, restricting to a single framing, or narrowing the temperature window causes the curve, the percentage of specifications on the expected side, and the displayed range to re-render together, which makes the dependence of the headline on each choice immediately visible.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "18eb70a080404994a74a1390440d53ad", "console": [], "id": "NCOB", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cdiv style='display: flex;flex: 1;flex-dire "}, "type": "data"}]}, {"code_hash": "d1a1874e1ac0c5897ecd6b680da3505d", "console": [], "id": "dNNg", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"7-where-does-the-variation-come-from\"\u003E7. Where does the variation come from?\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "912fd9c9a569f3080ce71157dc16e799", "console": [], "id": "yCnT", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ECoverage tells us whether the signal survives the multiverse; variance decomposition tells us which design choices are doing the actual moving. For each prompt dimension we compute \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\eta^2||)\u003C/marimo-tex\u003E, the ratio of between-group sum of squares to total sum of squares, on the raw response scores. Because the six dimensions are not orthogonal to each other, the per-item \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\eta^2||)\u003C/marimo-tex\u003E values do not sum to one, and treating them as a partition would be misleading. They are best read as a ranking of which lever a researcher would have most leverage on if they wanted to shift the result.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "0a581d7af8713e43dcd9cb4dda310efc", "console": [], "id": "wlCL", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EVariance decomposition by dimension, per item. The dominant lever for each item is highlighted in blue.\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-mime-renderer data-mime='\u0026quot;application/vnd.vegalite.v6+json\u0026quot;' data-data='\u0026quot;{\u0026#92;n  \u0026#92;\u0 ata"}]}, {"code_hash": "4551645b61290cd113ee74d276cac1e0", "console": [], "id": "kqZH", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"8-amplification-against-anes-2024\"\u003E8. Amplification against ANES 2024\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d42e06855f2c9e5afaccd13a84254e6d", "console": [], "id": "wAgl", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ECoverage and variance address whether and where the multiverse moves, but a separate question is whether its central tendency is well calibrated against real survey responses. We benchmark the mean LLM gap on each item against the corresponding ANES 2024 partisan gap and report the ratio. The pattern that emerges is consistent across items and worth pausing on: silicon-sampled gaps are not noisy approximations of ground truth but systematically larger versions of it, with both partisan poles inflating in tandem so that the gap widens symmetrically.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "ca28282f90d8daf2fa8b77ce2e56f475", "console": [], "id": "rEll", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: center;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003ELLM-simulated gaps next to ANES 2024 ground-truth gaps:\u003C/span\u003E\u003C/span\u003E\u003Cmarimo-mime-renderer data-mime='\u0026quot;application/vnd.vegalite.v6+json\u0026quot;' data-data='\u0026quot;{\u0026#92;n  \u0026#92;\u0026quot;\u0026#36;schema\u0026#92;\u0026quot;: \u0026#92;\u0026quot;https://vega.github.io/schema/vega-lite/v6.4.1.json\u0026#92;\u0026quot;,\u0026#92;n  \u0026#92;\u0026quot;config\u0026#92;\u0026quot;: {\u0026#92;n    \u0026#92 26quot;,[\u0026quot;string\u0026quot;,\u0026quot;str\u0026quot;]],[\u0026quot;Democrat\u0026quot;,[\u0026quot;number\u0026quot;,\u0026quot;float64\u0026quot;]],[\u0026quot;Republican\u0026quot;,[\u0026quot;number\u0026quot;,\u0026quot;float64\u0026quot;]],[\u0026quot;gap (D minus R)\u0026quot;,[\u0026quot;number\u0026quot;,\u0026quot;float64\u0026quot;]]]' data-show-filters='true' data-show-download='true' data-show-column-summaries='false' data-show-data-types='true' data-show-page-size-selector='false' data-show-column-explorer='true' data-show-chart-builder='true' data-row-headers='[]' data-has-stable-row-id='false' data-lazy='false' data-preload='false'\u003E\u003C/marimo-table\u003E\u003C/marimo-ui-element\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Cspan class=\"paragraph\"\u003EUnder the direct and forced-choice framings the model behaves as the rest of the multiverse does, returning healthy gaps of roughly +2.3 and +2.0 respectively. Under the Likert framing the same model on the same item produces a gap of \u22121.92, a full inversion of the partisan signal. The underlying mechanism appears to be scale-anchoring failure on a partially labeled scale rather than any deep ideological behavior, but a paper that happened to settle on Likert framing for Llama would have published the wrong direction without warning.\u003C/span\u003E\u003C/span\u003E\u003C/div\u003E"}, "type": "data"}]}, {"code_hash": "c57add1ba09fe56ea243fb04a8011f37", "console": [], "id": "fwwy", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"reading-the-multiverse-together\"\u003EReading the multiverse together\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EPulling the threads together, the picture that emerges is neither an indictment of silicon sampling nor an endorsement of it. The partisan signal on these three items survives between roughly eighty-seven and one hundred percent of defensible prompt designs, which is a real finding and one that nobody could establish from a single configuration; arriving at it required surveying the multiverse rather than walking through it. That stability, however, sits alongside two genuine sources of distortion that the practice of single-spec reporting will continue to obscure. Effect sizes are amplified by something close to a factor of two across systems, so anything that hangs on magnitudes rather than directions is, at present, untrustworthy. And occasional cells, of which Llama under Likert is the most striking, manage to flip the sign of the result entirely, which is exactly the kind of pathology that gets concealed when a paper reports a single number and a justification.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2479421f2aedfd9464f3315b18a535e2", "console": [], "id": "LJZf", "outputs": [{"data": {"text/html": "\n\u003Cdiv style=\"border:1px solid #A8A8A8; border-radius:4px;\n            padding:16px 20px; margin:18px auto 0 auto; max-width:680px;\n            font-family:Charter, 'Iowan Old Style', Palatino, Georgia, serif;\n            color:#161616; background:white\"\u003E\n  \u003Cdiv style=\"font-size:13px; color:#6F6F6F; letter-spacing:0.04em;\n              text-transform:uppercase; margin-bottom:8px\"\u003E\n    Cite this work\n  \u003C/div\u003E\n  \u003Cdiv style=\"font-size:14px; line-height:1.55; margin-bottom:14px\"\u003E\n    Crainic, J., Yee, B., and Koh, P. (2026). \u003Ci\u003EPrompt Specification Curve Analysis: How Arbitrary Choices Drive LLM-Simulated Opinion\u003C/i\u003E. YCRG-Labs.\n  \u003C/div\u003E\n  \u003Cdiv style=\"font-size:13px; color:#6F6F6F; letter-spacing:0.04em;\n              text-transform:uppercase; margin-bottom:8px\"\u003E\n    Reproduce locally\n  \u003C/div\u003E\n  \u003Cpre style=\"background:#F4F4F4; padding:10px 12px; border-radius:3px;\n              font-family:'SF Mono', Menlo, Consolas, monospace; font-size:12.5px;\n
